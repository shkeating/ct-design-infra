<!--
  Generative UI Few-Shot Example: ContentLink
  Use ct-content-link (not ct-link) for inline links embedded within body
  copy/paragraphs — it carries no icon prop and no active/disabled state,
  just underline styling plus an automatic external-link indicator. `theme`
  should match the background it sits on (light/dark). Set `external` for
  links that leave the current site; pair with `new-window` when they also
  open in a new tab.
-->
<p>
  Read the full details in our
  <ct-content-link
    theme="light"
    text="annual report"
    url="/reports/annual-report.pdf"
  ></ct-content-link>
  , or see how we compare against the
  <ct-content-link
    theme="light"
    text="CivicTheme design system"
    url="https://www.civictheme.io/"
    external
    new-window
  ></ct-content-link>
  it was ported from.
</p>
