<!--
  Generative UI Few-Shot Example: SubjectCard
  An image card with an overlaid, optionally-linked title, used in card-grid listings
  (e.g. "browse by topic"). The card image is composed via the real `ct-image` element
  rather than a plain `<img>`. By default the whole card is clickable via `link-url`;
  set `title-click` to make only the title text clickable instead.
-->
<ct-subject-card
  theme="light"
  heading="Parks and Recreation"
  image-url="/images/parks-and-recreation.jpg"
  image-alt="A family walking through a sunlit public park"
  link-url="/topics/parks-and-recreation"
>
</ct-subject-card>
