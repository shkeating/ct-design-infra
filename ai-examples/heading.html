<!--
  Generative UI Few-Shot Example: Heading
  Use this structure when composing a Heading component. `level` selects both
  the rendered semantic tag (<h1>-<h6>) and its typography scale step -
  pick it based on document structure/hierarchy, not desired visual size.
-->
<ct-heading theme="light" content="Welcome to CivicTheme" level="1"></ct-heading>

<ct-heading theme="light" content="Section overview" level="2"></ct-heading>

<ct-heading theme="dark" content="Dark theme subsection" level="3" modifier-class="ct-heading--promo"></ct-heading>
